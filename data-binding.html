<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Data binding</title>
    <script src="https://cdn.jsdelivr.net/npm/vue@2.6.14/dist/vue.js"></script>
  </head>
  <body>
    <div id="data_binding">
      <h1 v-bind:title="tagMessage">{{ message }}</h1>

      <p>My name is {{person.name}} and I speak {{person.language}}</p>
      <span v-html="tag"></span>
    </div>

    <script>
      let app = new Vue({
        el: "#data_binding",
        data: {
          message: "Mensagem para ser exibida",
          person: {
            name: "Jeferson",
            language: "Franch",
          },
          tag: "<button>Clique aqui</button>",
          tagMessage: "Mensagem para ser exibida no titulo da mensagem",
        },
      });
    </script>
  </body>
</html>
